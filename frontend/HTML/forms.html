    <h1>Forms in HTML</h1>
    <form method="get" action="">

      <div>
        <input type="text" value="" name="Name" placeholder="Enter your name" required>
      </div>

      <div>
        <textarea cols="30" rows="10" name="txtArea">
          White    space    does matter in   &lt;textarea&gt; &lt;/textarea&gt;
        </textarea>
      </div>
      <div>
        <select name="selected_option">
          <option value="1" disabled selected>Selected a value</option>
          <option value="2">Value 1</option>
          <option value="3">Value 2</option>
        </select>
      </div>

      <div>
        <button type="submit">Click me!</button>
        <button type="reset">Reset</button>
      </div>

    </form>
  </body>
